# Wiki.js production deployment
# Start: docker compose up -d --build
# Update app only: docker compose up -d --build --force-recreate --no-deps wiki

version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: wiki-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wikijs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - wiki-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-wikijs} -d $${POSTGRES_DB:-wiki}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wiki:
    build:
      context: ../..
      dockerfile: dev/build/Dockerfile
    image: ${WIKI_IMAGE:-wiki-custom:latest}
    container_name: wiki-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-wikijs}
      DB_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-wiki}
      DB_SSL: "false"
      SSL_ACTIVE: "false"
      HA_ACTIVE: "false"
      WIKI_DEV_MODE: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-default}
    ports:
      - "${WIKI_PORT:-3000}:3000"
    volumes:
      - wiki-data:/wiki/data

volumes:
  wiki-db-data:
  wiki-data:
